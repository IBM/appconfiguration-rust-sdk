name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  workflow_dispatch:

jobs:

  # Release unpublished packages on-demand.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Release-plz
        run: |
          cargo install --locked release-plz
          cargo install --locked cargo-semver-checks
      - name: Release crate
        run: release-plz release --git-token $GITHUB_TOKEN --repo-url "https://github.com/IBM/${{ github.event.repository.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Optional: You can still run this manually to preview/prep your next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Release-plz
        run: |
          cargo install --locked release-plz
          cargo install --locked cargo-semver-checks
      - name: Create or update PR
        run: release-plz release-pr --git-token $GITHUB_TOKEN --repo-url "https://github.com/IBM/${{ github.event.repository.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
